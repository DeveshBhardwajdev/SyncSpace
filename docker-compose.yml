networks:
  syncspace-network:
    driver: bridge

volumes:
  auth-mongodb-data:
  rabbitmq-data:
  redis-data:

services:

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: syncspace-auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:password123@auth-mongodb:27017/syncspace-auth?authSource=admin
      - JWT_ACCESS_SECRET=syncspace_access_secret_super_long_random_string_change_this_in_production
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_SECRET=syncspace_refresh_secret_another_long_random_string_change_this_in_production
      - JWT_REFRESH_EXPIRY=7d
      - REDIS_URL=redis://redis:6379
    depends_on:
      auth-mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - syncspace-network
    restart: unless-stopped

  auth-mongodb:
    image: mongo:7.0
    container_name: syncspace-auth-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: syncspace-auth
    volumes:
      - auth-mongodb-data:/data/db
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: syncspace-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: syncspace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command: redis-server --appendonly yes
