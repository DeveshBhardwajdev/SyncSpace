networks:
  syncspace-network:
    driver: bridge

volumes:
  auth-mongodb-data:
  rabbitmq-data:
  redis-data:
  user-mongodb-data:

services:

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: syncspace-auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/auth-service/.env
    depends_on:
      auth-mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - syncspace-network
    restart: unless-stopped

  auth-mongodb:
    image: mongo:7.0
    container_name: syncspace-auth-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: syncspace-auth
    volumes:
      - auth-mongodb-data:/data/db
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: syncspace-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: syncspace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command: redis-server --appendonly yes

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: syncspace-api-gateway
    ports:
      - "8080:80"
    depends_on:
      - auth-service
    networks:
      - syncspace-network
    restart: unless-stopped

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: syncspace-user-service
    ports:
      - "3002:3002"
    env_file:
      - ./services/user-service/.env
    depends_on:
      user-mongodb:
        condition: service_healthy
    networks:
      - syncspace-network
    restart: unless-stopped

  user-mongodb:
    image: mongo:7.0
    container_name: syncspace-user-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: syncspace-users
    volumes:
      - user-mongodb-data:/data/db
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
